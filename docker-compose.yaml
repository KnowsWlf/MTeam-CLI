services:

  mteam-cli:
    image: knowswlf/mteam-cli:${MTEAM_IMAGE_TAG:-latest}
    container_name: mteam-cli
    build:
      context: .
      dockerfile: ./Dockerfile
    restart: always
    environment:
      - TZ=Asia/Shanghai
      # 密钥可选：也可全部写进 config.toml。若想把明文排除在 config.toml 之外，
      # 在这里（或 .env / compose secrets）注入，env 覆盖同名 TOML 值：
      # - MTEAM_PASSWORD_1=
      # - MTEAM_TOTP_SECRET_1=
      # - MTEAM_API_KEY_1=
      # - NOTIFY_SMTP_PASSWORD=

    volumes:
      # 配置：把本地 config.toml 挂到容器默认发现路径 /app/config.toml（只读）。
      # 复制 config.toml.template → config.toml 并填写后再 up。
      - ./config.toml:/app/config.toml:ro
      # 持久状态：每账户 localStorage 登录态 + 日志。
      - mteam-data:/app/data

    command: ["mteam-cli", "schedule"]
    healthcheck:
      test: ["CMD", "pgrep", "-f", "mteam-cli schedule"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mteam-data:
