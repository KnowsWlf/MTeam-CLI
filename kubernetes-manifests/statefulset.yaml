# M-Team CLI — 保活调度的 Kubernetes 部署（有状态）
#
# 为什么用 StatefulSet 而不是 Deployment：
#   保活的核心状态是每账户的登录态（localStorage 快照，存于 /app/data/auth）。
#   它必须在 Pod 重建后存活，且同一时刻只能有一个实例持有（避免并发刷新登录
#   态互相挤掉）。这正是 StatefulSet + volumeClaimTemplates 的语义。
#
# 配置形态（混合式，符合 12-factor）：
#   * 非密钥结构 → ConfigMap（config.toml），只读挂到 /app/config.toml
#   * 密钥（password/totp_secret/api_key/smtp password）→ Secret，作为 env 注入，
#     由程序的 env 覆盖机制盖过 config.toml 里留空的同名字段。明文不入 ConfigMap。
#   env 覆盖名（账户 i = config.toml 里 [[account]] 的 1-based 顺序）：
#     MTEAM_PASSWORD_i / MTEAM_TOTP_SECRET_i / MTEAM_API_KEY_i / NOTIFY_SMTP_PASSWORD
#
# 登录全自动（TOTP，无需扫码）：容器跑 `mteam-cli schedule`。
#
# 部署：
#   1. 编辑下面 ConfigMap 的 config.toml（结构；密钥留空）+ Secret（填真实密钥）
#   2. kubectl apply -f kubernetes-manifests/statefulset.yaml
#   3. kubectl logs -f mteam-cli-0
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mteam-cli-config
  labels:
    app: mteam-cli
data:
  config.toml: |
    [site]
    headless = true

    [schedule]
    window = "09:00-11:00"
    pre_delay_range = "10-300"
    heartbeat_hours = 1

    [smtp]
    host = ""
    port = 465
    user = ""
    from = ""
    use_tls = true
    # password 走 Secret（NOTIFY_SMTP_PASSWORD）注入

    [digest]
    min_imdb = 8.0
    min_seeders = 30
    types = ["movie", "tvshow"]
    hours = 24
    limit = 10

    [[account]]
    username = "user1"
    digest_enabled = false
    # password / totp_secret / api_key 走 Secret（MTEAM_*_1）注入
      [account.notify]
      telegram_token = ""
      telegram_chat_id = ""
      feishu_token = ""
      smtp_to = ""
---
apiVersion: v1
kind: Secret
metadata:
  name: mteam-cli-secrets
  labels:
    app: mteam-cli
type: Opaque
stringData:
  # 账户 1 的密钥（对应 ConfigMap 里第 1 个 [[account]]）
  MTEAM_PASSWORD_1: "pass1"
  MTEAM_TOTP_SECRET_1: "totp1"
  MTEAM_API_KEY_1: "apikey1"
  # 全局 SMTP 密码（授权码）
  NOTIFY_SMTP_PASSWORD: ""
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mteam-cli
  labels:
    app: mteam-cli
spec:
  serviceName: mteam-cli
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: mteam-cli
  template:
    metadata:
      labels:
        app: mteam-cli
    spec:
      securityContext:
        # pwuser in the Playwright image is uid/gid 1001 (uid 1000 is `ubuntu`);
        # the app runs as pwuser, so all of these must be 1001.
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      # A freshly-provisioned PVC mounts root-owned and overlays the image's
      # build-time chown, so the non-root app can't write /app/data. fsGroup
      # fixes group perms on most CSI drivers but some ignore it — this
      # initContainer chowns the mount as root, making it storage-independent.
      initContainers:
        - name: fix-data-perms
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 1001:1001 /app/data"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: data
              mountPath: /app/data
      containers:
        - name: mteam-cli
          image: knowswlf/mteam-cli:latest
          imagePullPolicy: IfNotPresent
          command: ["mteam-cli", "schedule"]
          env:
            - name: TZ
              value: Asia/Shanghai
          # 密钥从 Secret 注入为环境变量，覆盖 config.toml 里留空的同名字段。
          envFrom:
            - secretRef:
                name: mteam-cli-secrets
          volumeMounts:
            - name: config
              mountPath: /app/config.toml
              subPath: config.toml
              readOnly: true
            - name: data
              mountPath: /app/data
          livenessProbe:
            exec:
              command: ["pgrep", "-f", "mteam-cli schedule"]
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["pgrep", "-f", "mteam-cli schedule"]
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
      volumes:
        - name: config
          configMap:
            name: mteam-cli-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
